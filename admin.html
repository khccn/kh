<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - بيور ديزاين</title>
    <link rel="icon" href="888888.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8e735b; --bg: #f8f5f2; --text: #2d3436; --white: #ffffff; --success: #27ae60; --danger: #d63031; --warning: #f39c12; --blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; display: none; }
        
        .header { text-align: center; margin-bottom: 30px; position: relative; }
        .admin-logo { width: 100px; margin-bottom: 10px; transition: 0.3s; }
        .logout-btn { position: absolute; left: 0; top: 10px; background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid rgba(142, 115, 91, 0.1); }
        h3 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; color: var(--primary); display: flex; align-items: center; gap: 10px; font-size: 1.2rem; }
        
        /* تحسين الجداول للجوال */
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; } /* يضمن عدم انضغاط الجدول */
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #fafafa; color: var(--primary); font-weight: 600; white-space: nowrap; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; width: 100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; grid-column: 1 / -1; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; font-family: inherit; }
        .btn-add { background: var(--success); color: white; justify-content: center; font-size: 16px; grid-column: 1 / -1; }
        .btn-edit { background: var(--primary); color: white; }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; display: inline-block; white-space: nowrap; }
        .status-new { background: #fff3cd; color: #856404; }
        .status-done { background: #d4edda; color: #155724; }

        .action-btns { display: flex; gap: 8px; align-items: center; }
        .btn-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: white; font-size: 14px; flex-shrink: 0; }

        /* تعديلات الجوال (Media Queries) */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { padding: 15px; }
            .admin-logo { width: 80px; }
            h1 { font-size: 1.4rem; }
            .logout-btn { padding: 5px 10px; font-size: 12px; top: 0; }
            .form-grid { grid-template-columns: 1fr; }
            .btn-add { font-size: 14px; }
            th, td { padding: 10px; font-size: 13px; }
            .action-btns { flex-wrap: wrap; }
        }

        /* النوافذ المنبثقة */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(5px); padding: 15px; box-sizing: border-box; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 450px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 4000; padding: 20px; }
        .login-box { background: white; padding: 35px; border-radius: 25px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="82433.png" style="width: 80px; margin-bottom: 20px;">
        <h2 style="color:var(--primary)">دخول الإدارة</h2>
        <input type="email" id="admin-email" placeholder="البريد الإلكتروني" style="margin-bottom:15px;">
        <input type="password" id="admin-pass" placeholder="كلمة المرور" style="margin-bottom:20px;" onkeypress="if(event.key==='Enter')checkPass()">
        <button class="btn btn-edit" onclick="checkPass()" style="width:100%; justify-content:center;">دخول</button>
    </div>
</div>

<div id="edit-modal-overlay" class="modal-overlay">
    <div class="modal-box">
        <h3><i class="fas fa-edit"></i> تعديل المنتج</h3>
        <input type="hidden" id="edit-p-id">
        <input type="text" id="edit-p-name" placeholder="اسم المنتج" style="margin-bottom:10px;">
        <div style="display: flex; gap: 10px; margin-bottom:10px;">
            <input type="number" id="edit-p-price" placeholder="السعر الحالي">
            <input type="number" id="edit-p-old-price" placeholder="السعر السابق">
        </div>
        <input type="text" id="edit-p-cat" placeholder="القسم" style="margin-bottom:10px;">
        <input type="text" id="edit-p-img" placeholder="اسم الصورة" style="margin-bottom:10px;">
        <textarea id="edit-p-desc" placeholder="الوصف" style="margin-bottom:15px;"></textarea>
        <button class="btn btn-edit" style="width:100%; justify-content:center; background:var(--success); margin-bottom:10px;" onclick="saveProductEdit()">حفظ التعديلات</button>
        <button class="btn" style="width:100%; justify-content:center; background:#eee; color:#333;" onclick="closeModal('edit-modal-overlay')">إلغاء</button>
    </div>
</div>

<div id="order-modal-overlay" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-order-title" style="color:var(--primary)">تفاصيل الطلب</h3>
        <div id="order-details-content"></div>
        <hr style="border:none; border-top:1px solid #eee; margin:20px 0;">
        <button class="btn btn-edit" style="width:100%; justify-content:center;" onclick="closeModal('order-modal-overlay')">إغلاق</button>
    </div>
</div>

<div class="container" id="main-content">
    <div class="header">
        <button class="logout-btn" onclick="logout()">خروج</button>
        <img src="82433.png" class="admin-logo">
        <h1>لوحة التحكم</h1>
    </div>

    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h3>
        <div class="form-grid">
            <input type="text" id="new-p-name" placeholder="اسم المنتج">
            <input type="number" id="new-p-price" placeholder="السعر الحالي">
            <input type="number" id="new-p-old-price" placeholder="السعر السابق (اختياري)">
            <input list="cats" id="new-p-cat" placeholder="القسم">
            <datalist id="cats"><option value="خدمات رقمية"><option value="بشارات"><option value="دعوات"></datalist>
            <input type="text" id="new-p-img" placeholder="اسم الصورة">
            <textarea id="new-p-desc" placeholder="وصف المنتج"></textarea>
            <button class="btn btn-add" onclick="addNewProduct()">إدراج في المتجر</button>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-box"></i> إدارة المنتجات</h3>
        <input type="text" id="product-search" placeholder="ابحث عن منتج..." oninput="filterProductsTable()" style="margin-bottom:15px;">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>المنتج</th><th>القسم</th><th>السعر</th><th>العمليات</th></tr></thead>
                <tbody id="products-body"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-history"></i> سجل الطلبات</h3>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>التاريخ</th><th>الطلب</th><th>الإجمالي</th><th>الحالة والتحكم</th></tr></thead>
                <tbody id="orders-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyArRTcygI2dadObLCWPSVxOfC3gkBjyHHo",
        authDomain: "pure-design-de0f7.firebaseapp.com",
        projectId: "pure-design-de0f7",
        storageBucket: "pure-design-de0f7.firebasestorage.app",
        messagingSenderId: "647657577378",
        appId: "1:647657577378:web:6d192aa609c921c16db0fb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.allProducts = [];
    window.allOrders = [];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';
        }
    });

    window.checkPass = async () => {
        const e = document.getElementById('admin-email').value;
        const p = document.getElementById('admin-pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { alert("خطأ في البيانات!"); }
    };

    window.logout = () => signOut(auth);

    async function loadData() {
        const pSnap = await getDocs(collection(db, "products"));
        window.allProducts = [];
        pSnap.forEach(d => window.allProducts.push({docId: d.id, ...d.data()}));
        renderProductsTable(window.allProducts);

        const oSnap = await getDocs(collection(db, "orders"));
        window.allOrders = [];
        oSnap.forEach(d => window.allOrders.push({docId: d.id, ...d.data()}));
        window.allOrders.sort((a,b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
        renderOrdersTable();
    }

    function renderProductsTable(data) {
        const tbody = document.getElementById('products-body');
        tbody.innerHTML = data.map(p => `
            <tr style="opacity: ${p.isHidden ? '0.5' : '1'}">
                <td>${p.name} ${p.isHidden ? '<small>(مخفي)</small>' : ''}</td>
                <td><span class="status-badge" style="background:#eee">${p.category}</span></td>
                <td><b>${p.price}</b>${p.oldPrice ? `<br><del style="font-size:10px; color:red">${p.oldPrice}</del>` : ''}</td>
                <td class="action-btns">
                    <button class="btn-circle" style="background:var(--blue)" onclick="openEditModal('${p.docId}')"><i class="fas fa-pen"></i></button>
                    <button class="btn-circle" style="background:${p.isHidden ? '#999' : 'var(--warning)'}" onclick="toggleHide('${p.docId}', ${p.isHidden})"><i class="fas ${p.isHidden ? 'fa-eye-slash' : 'fa-eye'}"></i></button>
                    <button class="btn-circle" style="background:var(--danger)" onclick="deleteProduct('${p.docId}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    window.filterProductsTable = () => {
        const term = document.getElementById('product-search').value.toLowerCase();
        const filtered = window.allProducts.filter(p => p.name.toLowerCase().includes(term) || p.category.toLowerCase().includes(term));
        renderProductsTable(filtered);
    };

    function renderOrdersTable() {
        const tbody = document.getElementById('orders-body');
        tbody.innerHTML = window.allOrders.map(o => `
            <tr>
                <td><small>${o.createdAt?.toDate().toLocaleString('ar-SA') || 'جديد'}</small></td>
                <td><button style="border:none; background:none; color:var(--blue); cursor:pointer; font-weight:bold" onclick="viewOrderDetails('${o.docId}')">#${o.orderNumber || o.docId.substring(0,5)}</button></td>
                <td><b>${o.total}</b></td>
                <td class="action-btns">
                    <span class="status-badge ${o.status === 'مكتمل' ? 'status-done' : 'status-new'}">${o.status || 'جديد'}</span>
                    <button class="btn-circle" style="background:var(--success)" onclick="updateStatus('${o.docId}', 'مكتمل')"><i class="fas fa-check"></i></button>
                    <button class="btn-circle" style="background:var(--warning)" onclick="updateStatus('${o.docId}', 'جديد')"><i class="fas fa-times"></i></button>
                    <button class="btn-circle" style="background:var(--danger)" onclick="deleteOrder('${o.docId}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    window.viewOrderDetails = (id) => {
        const o = window.allOrders.find(x => x.docId === id);
        document.getElementById('modal-order-title').innerText = "طلب #" + (o.orderNumber || id.substring(0,5));
        let html = o.items.map(item => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed #eee;"><span>${item.name} (x${item.quantity})</span><b>${item.price * item.quantity}</b></div>`).join('');
        html += `<div style="margin-top:10px; text-align:left; font-weight:bold; color:var(--primary)">الإجمالي: ${o.total}</div>`;
        document.getElementById('order-details-content').innerHTML = html;
        document.getElementById('order-modal-overlay').style.display = 'flex';
    };

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    window.addNewProduct = async () => {
        const oldP = document.getElementById('new-p-old-price').value;
        const data = {
            id: Math.floor(10000 + Math.random() * 90000),
            name: document.getElementById('new-p-name').value,
            price: Number(document.getElementById('new-p-price').value),
            category: document.getElementById('new-p-cat').value,
            image: document.getElementById('new-p-img').value,
            desc: document.getElementById('new-p-desc').value,
            isHidden: false, hasOptions: false
        };
        if(oldP) data.oldPrice = Number(oldP);
        await addDoc(collection(db, "products"), data);
        alert("تمت الإضافة!"); loadData();
    };

    window.toggleHide = async (id, current) => { await updateDoc(doc(db, "products", id), {isHidden: !current}); loadData(); };
    window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), {status: s}); loadData(); };
    window.deleteOrder = async (id) => { if(confirm("حذف الطلب؟")) { await deleteDoc(doc(db, "orders", id)); loadData(); } };
    window.deleteProduct = async (id) => { if(confirm("حذف المنتج؟")) { await deleteDoc(doc(db, "products", id)); loadData(); } };

    window.openEditModal = (id) => {
        const p = window.allProducts.find(x => x.docId === id);
        document.getElementById('edit-p-id').value = id;
        document.getElementById('edit-p-name').value = p.name;
        document.getElementById('edit-p-price').value = p.price;
        document.getElementById('edit-p-old-price').value = p.oldPrice || '';
        document.getElementById('edit-p-cat').value = p.category;
        document.getElementById('edit-p-img').value = p.image;
        document.getElementById('edit-p-desc').value = p.desc;
        document.getElementById('edit-modal-overlay').style.display = 'flex';
    };

    window.saveProductEdit = async () => {
        const id = document.getElementById('edit-p-id').value;
        const oldP = document.getElementById('edit-p-old-price').value;
        const data = {
            name: document.getElementById('edit-p-name').value,
            price: Number(document.getElementById('edit-p-price').value),
            category: document.getElementById('edit-p-cat').value,
            image: document.getElementById('edit-p-img').value,
            desc: document.getElementById('edit-p-desc').value,
            oldPrice: oldP ? Number(oldP) : null
        };
        await updateDoc(doc(db, "products", id), data);
        closeModal('edit-modal-overlay'); loadData();
    };
</script>
</body>
</html>
